<!DOCTYPE html>
<html>
    <head>
        <style>
         body {
            display: flex;
            margin: 0;
            height: 100vh;
            background-color: #255c25;
            color: white;
         }
         #sidebar {
            width: 70px;
            background-color: #202225;
            padding: 10px;
         }
         #channels{
            width: 200px;
            background-color: #2f3136;
            padding: 10px;
         }
         #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #36393f;
            padding: 10px;
         }
         #messages{
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
         }
         #input-area {
            display: flex;
            gap: 10px;
            padding: 10px}
        
         #input-area input{
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #40444b;
            color: white;
         }
         #input-area button {
            padding: 10px 20px;
            background-color: #5865f2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
         }
    </style>
</head>
    <body>
    <div id="sidebar">
        <p>サーバー</p>
    </div>
    <div id="channels">
        <p># general</p>
        <p># random</p>
    </div>
    <div id="chat">
        <div id="messages">
        {% for msg in messages %}
        <p>{{ msg.username }}: {{ msg.text }}</p>
        {% endfor %}
        </div>
        <div id="input-area">
        <input type="text" placeholder="メッセージを入力.  .  .">
        <button>送信</button>
        </div>
    </div> 
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        fetch('/users')
        .then(response => response.json())
        .then(users => {
            const sidebar = document.getElementById('channels');
            sidebar.innerHTML = '<p>ユーザー一覧</p>';
            users.forEach(user => {
                if(user.username !== '{{ current_user.username }}'){
                    sidebar.innerHTML += '<p class="dm-user" onclick=openDM(\'' + user.username + '\')">' + username + '<p>';
                }
            });
        });

        function openDM(username) {
            alert(username + 'さんにDM');
        }
        const socket = io();
        const button = document.querySelector('button');
        const input = document.querySelector('input');
        const messages = document.getElementById('messages');

        function sendMessage() {
            const text = input.value;
            if(text === '')return
            socket.emit('message', text);
            input.value = '';
        }


        button.addEventListener('click', function(){
            sendMessage();
        });

        input.addEventListener('keydown', function(e) {
            if(e.key === 'Enter'){
                sendMessage();
            }
        });

        socket.on('message', function(data){
            messages.insertAdjacentHTML('beforeend', '<p>' +data.username + ': ' + data.text + '</p>');

        });
    </script>     
  </body>
</html>
